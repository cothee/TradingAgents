# Nginx 反向代理配置模板 — TradingAgents
#
# 使用前将以下占位符替换为实际值：
#   YOUR_DOMAIN       → 带 www 的域名（如 www.example.com）
#   YOUR_NAKED_DOMAIN → 裸域名（如 example.com）
#   YOUR_CERT_PATH    → SSL 证书路径（如 /etc/letsencrypt/live/.../fullchain.pem）
#   YOUR_KEY_PATH     → SSL 私钥路径（如 /etc/letsencrypt/live/.../privkey.pem）
#
# 用法：
#   1. 复制此文件到 Nginx 配置目录：
#      sudo cp nginx.conf /etc/nginx/conf.d/tradingagents.conf
#   2. 替换占位符后检查配置：
#      sudo nginx -t
#   3. 重载 Nginx：
#      sudo nginx -s reload
#
# 注意：SSL 证书需同时包含 YOUR_DOMAIN 和 YOUR_NAKED_DOMAIN，
#       可通过 certbot 扩展已有证书：
#       sudo certbot certonly --cert-name YOUR_DOMAIN \
#         -d YOUR_DOMAIN,YOUR_NAKED_DOMAIN --standalone

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate YOUR_CERT_PATH;
    ssl_certificate_key YOUR_KEY_PATH;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP 自动跳转到 HTTPS www
server {
    listen 80;
    server_name YOUR_NAKED_DOMAIN YOUR_DOMAIN;
    return 301 https://YOUR_DOMAIN$request_uri;
}

# 裸域名 HTTPS 跳转到 www HTTPS
server {
    listen 443 ssl;
    server_name YOUR_NAKED_DOMAIN;

    ssl_certificate YOUR_CERT_PATH;
    ssl_certificate_key YOUR_KEY_PATH;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://YOUR_DOMAIN$request_uri;
}
